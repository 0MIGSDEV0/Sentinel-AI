<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Guitar Hero Web</title>

<style>
body {
    background: radial-gradient(circle, #111, #000);
    color: white;
    text-align: center;
    font-family: Arial;
}

h1 {
    text-shadow: 0 0 10px red;
}

.game {
    display: flex;
    justify-content: center;
    margin-top: 20px;
}

.lane {
    width: 85px;
    height: 420px;
    border: 2px solid rgba(255,255,255,0.2);
    margin: 5px;
    position: relative;
    overflow: hidden;
    background: rgba(255,255,255,0.03);
}

/* NOTAS */
.note {
    width: 100%;
    height: 60px;
    position: absolute;
    top: 0;
    border-radius: 6px;
    box-shadow: 0 0 8px;
}

.red { background: red; box-shadow: 0 0 10px red; }
.yellow { background: yellow; box-shadow: 0 0 10px yellow; }
.blue { background: dodgerblue; box-shadow: 0 0 10px dodgerblue; }
.green { background: limegreen; box-shadow: 0 0 10px limegreen; }

/* HITBOX */
.hitbox {
    position: absolute;
    bottom: 60px;
    left: 5px;
    right: 5px;
    height: 60px;

    border: 3px solid cyan;
    background: rgba(0,255,255,0.12);
    box-shadow: 0 0 12px cyan;
    border-radius: 6px;
}

/* HUD */
#hud {
    font-size: 18px;
    margin-top: 10px;
}

#combo {
    color: cyan;
}

#player {
    position: absolute;
    left: -9999px;
}

button {
    padding: 8px 12px;
    background: red;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 6px;
}
</style>
</head>

<body>

<h1>🎸 Guitar Hero Web</h1>

<button onclick="iniciarJogo()">▶️ Começar</button>

<div id="hud">
🏆 Pontos: <span id="score">0</span> |
🔥 Combo: <span id="combo">0</span>
</div>

<div id="player"></div>

<div class="game">
    <div class="lane" id="lane1"><div class="hitbox"></div></div>
    <div class="lane" id="lane2"><div class="hitbox"></div></div>
    <div class="lane" id="lane3"><div class="hitbox"></div></div>
    <div class="lane" id="lane4"><div class="hitbox"></div></div>
</div>

<p>Teclas: Z X N M</p>

<script>
let player;
let jogoRodando = false;
let score = 0;
let combo = 0;

function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
        height: '0',
        width: '0',
        videoId: 'E0ozmU9cJDg',
        playerVars: { autoplay: 0, controls: 0, mute: 1 }
    });
}

let tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.body.appendChild(tag);

const lanes = [
    document.getElementById("lane1"),
    document.getElementById("lane2"),
    document.getElementById("lane3"),
    document.getElementById("lane4")
];

const teclas = ["z", "x", "n", "m"];
const cores = ["red", "yellow", "blue", "green"];

const BPM = 220;
const intervaloNotas = 60000 / BPM;
const velocidade = 9;

function iniciarJogo() {
    if (!player) return;

    jogoRodando = true;
    score = 0;
    combo = 0;

    updateHUD();

    player.playVideo();

    setTimeout(() => {
        player.unMute();
        player.setVolume(100);
    }, 300);

    loopNotas();
}

function criarNota() {
    const laneIndex = Math.floor(Math.random() * 4);
    const note = document.createElement("div");

    note.classList.add("note");
    note.classList.add(cores[laneIndex]);

    lanes[laneIndex].appendChild(note);

    let pos = 0;

    const intervalo = setInterval(() => {
        pos += velocidade;
        note.style.top = pos + "px";

        if (pos > 420) {
            clearInterval(intervalo);
            note.remove();

            combo = 0;
            updateHUD();
        }
    }, 20);
}

function loopNotas() {
    if (!jogoRodando) return;

    criarNota();
    setTimeout(loopNotas, intervaloNotas);
}

function updateHUD() {
    document.getElementById("score").innerText = score;
    document.getElementById("combo").innerText = combo;
}

document.addEventListener("keydown", (e) => {
    const index = teclas.indexOf(e.key);
    if (index === -1) return;

    const lane = lanes[index];
    const notes = lane.getElementsByClassName("note");

    if (notes.length > 0) {
        const note = notes[0];
        const pos = parseInt(note.style.top);

        let pontos = 0;

        if (pos > 340 && pos < 400) {
            pontos = 20;
            combo++;
        }
        else if (pos > 280 && pos < 460) {
            pontos = 10;
            combo++;
        }
        else {
            pontos = 5;
            combo = 0;
        }

        score += pontos;

        updateHUD();

        note.style.background = "white";
        setTimeout(() => note.remove(), 50);
    }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Guitar Hero Web</title>

<style>
body {
    background: black;
    color: white;
    text-align: center;
    font-family: Arial;
}

.game {
    display: flex;
    justify-content: center;
    margin-top: 20px;
}

.lane {
    width: 80px;
    height: 400px;
    border: 2px solid white;
    margin: 5px;
    position: relative;
    overflow: hidden;
}

.note {
    width: 100%;
    height: 20px;
    background: red;
    position: absolute;
    top: 0;
}

.hit {
    position: absolute;
    bottom: 0;
    height: 10px;
    width: 100%;
    background: yellow;
}
</style>
</head>

<body>

<h1>🎸 Guitar Hero Web</h1>

<button onclick="iniciarJogo()">▶️ Começar</button>

<br><br>

<!-- vídeo da música -->
<iframe width="560" height="315"
src="https://www.youtube.com/embed/E0ozmU9cJDg"
frameborder="0" allowfullscreen></iframe>

<div class="game">
    <div class="lane" id="lane1"><div class="hit"></div></div>
    <div class="lane" id="lane2"><div class="hit"></div></div>
    <div class="lane" id="lane3"><div class="hit"></div></div>
    <div class="lane" id="lane4"><div class="hit"></div></div>
</div>

<p>Teclas: A S D F</p>
<h2>Pontos: <span id="score">0</span></h2>

<script>
const lanes = [
    document.getElementById("lane1"),
    document.getElementById("lane2"),
    document.getElementById("lane3"),
    document.getElementById("lane4")
];

let jogoRodando = false;
let score = 0;

function iniciarJogo() {
    jogoRodando = true;
    loopNotas();
}

function criarNota() {
    const laneIndex = Math.floor(Math.random() * 4);
    const note = document.createElement("div");
    note.classList.add("note");

    lanes[laneIndex].appendChild(note);

    let pos = 0;

    const intervalo = setInterval(() => {
        pos += 5;
        note.style.top = pos + "px";

        if (pos > 380) {
            clearInterval(intervalo);
            note.remove();
        }
    }, 30);

    note.dataset.lane = laneIndex;
    note.dataset.intervalo = intervalo;
}

function loopNotas() {
    if (!jogoRodando) return;

    criarNota();
    setTimeout(loopNotas, 600);
}

document.addEventListener("keydown", (e) => {
    const teclas = ["a", "s", "d", "f"];
    const index = teclas.indexOf(e.key);

    if (index !== -1) {
        const lane = lanes[index];
        const notes = lane.getElementsByClassName("note");

        if (notes.length > 0) {
            const note = notes[0];
            const pos = parseInt(note.style.top);

            // área de acerto
            if (pos > 320 && pos < 400) {
                score += 10;
                document.getElementById("score").innerText = score;
                note.remove();
            }
        }
    }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Guitar Hero Sync</title>

<style>
body {
    background: radial-gradient(circle at top, #111, #000);
    color: white;
    text-align: center;
    font-family: Arial;
}

h1 {
    text-shadow: 0 0 10px red;
}

.game {
    display: flex;
    justify-content: center;
    margin-top: 20px;
}

.lane {
    width: 90px;
    height: 450px;
    border: 2px solid rgba(255,255,255,0.3);
    margin: 6px;
    position: relative;
    overflow: hidden;
    background: rgba(255,255,255,0.03);
    box-shadow: inset 0 0 10px rgba(255,0,0,0.2);
}

.note {
    width: 100%;
    height: 20px;
    background: linear-gradient(red, darkred);
    position: absolute;
    top: 0;
    border-radius: 6px;
    box-shadow: 0 0 8px red;
}

.hit {
    position: absolute;
    bottom: 0;
    height: 12px;
    width: 100%;
    background: yellow;
    box-shadow: 0 0 10px yellow;
}

#player {
    position: absolute;
    left: -9999px;
}

button {
    margin: 5px;
    padding: 8px 12px;
    border: none;
    background: red;
    color: white;
    cursor: pointer;
    border-radius: 6px;
}

button:hover {
    background: darkred;
}

#hud {
    margin-top: 10px;
    font-size: 18px;
}
</style>
</head>

<body>

<h1>🎸 Guitar Hero Sync</h1>

<button onclick="iniciarJogo()">▶️ Começar</button>

<div id="hud">
🏆 Pontos: <span id="score">0</span> |
❤️ Vida: <span id="life">5</span>
</div>

<h3>Teclas: <span id="keysDisplay"></span></h3>

<button onclick="mudarTecla(0)">Lane 1</button>
<button onclick="mudarTecla(1)">Lane 2</button>
<button onclick="mudarTecla(2)">Lane 3</button>
<button onclick="mudarTecla(3)">Lane 4</button>

<div id="player"></div>

<div class="game">
    <div class="lane" id="lane0"><div class="hit"></div></div>
    <div class="lane" id="lane1"><div class="hit"></div></div>
    <div class="lane" id="lane2"><div class="hit"></div></div>
    <div class="lane" id="lane3"><div class="hit"></div></div>
</div>

<script>
/* ===================== CHART ===================== */
const chart = [
    { time: 1.2, lane: 0 },
    { time: 1.6, lane: 1 },
    { time: 2.0, lane: 2 },
    { time: 2.4, lane: 3 },
    { time: 2.8, lane: 0 },
    { time: 3.2, lane: 1 },
    { time: 3.6, lane: 2 },
    { time: 4.0, lane: 3 },
];

/* ===================== TECLAS ===================== */
let teclas = ["a", "s", "d", "f"];

function atualizarUI() {
    document.getElementById("keysDisplay").innerText =
        teclas.map((t, i) => `Lane ${i+1}: ${t.toUpperCase()}`).join(" | ");
}
atualizarUI();

/* ===================== VARIÁVEIS ===================== */
let player;
let jogoRodando = false;
let score = 0;
let life = 5;
let spawned = 0;

const lanes = [
    document.getElementById("lane0"),
    document.getElementById("lane1"),
    document.getElementById("lane2"),
    document.getElementById("lane3"),
];

/* ===================== YOUTUBE ===================== */
function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
        height: '0',
        width: '0',
        videoId: 'E0ozmU9cJDg',
        playerVars: { autoplay: 0, controls: 0, mute: 1 }
    });
}

let tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.body.appendChild(tag);

/* ===================== INICIAR ===================== */
function iniciarJogo() {
    if (!player) return;

    score = 0;
    life = 5;
    spawned = 0;
    jogoRodando = false;

    document.getElementById("score").innerText = score;
    document.getElementById("life").innerText = life;

    player.seekTo(0);
    player.playVideo();

    setTimeout(() => {
        player.unMute();
        player.setVolume(100);
        jogoRodando = true;
        loop();
    }, 1200);
}

/* ===================== LOOP ===================== */
function loop() {
    if (!jogoRodando) return;

    const currentTime = player.getCurrentTime();

    while (spawned < chart.length && chart[spawned].time <= currentTime + 2) {
        spawnNote(chart[spawned]);
        spawned++;
    }

    requestAnimationFrame(loop);
}

/* ===================== SPAWN ===================== */
function spawnNote(data) {
    const note = document.createElement("div");
    note.classList.add("note");

    lanes[data.lane].appendChild(note);

    let pos = 0;
    const speed = 9;

    const interval = setInterval(() => {
        pos += speed;
        note.style.top = pos + "px";

        if (pos > 420) {
            clearInterval(interval);
            note.remove();

            loseLife(); // 💀 errou nota
        }
    }, 20);
}

/* ===================== HIT ===================== */
document.addEventListener("keydown", (e) => {
    const index = teclas.indexOf(e.key);
    if (index === -1) return;

    const lane = lanes[index];
    const notes = lane.getElementsByClassName("note");

    if (notes.length > 0) {
        const note = notes[0];
        const rect = note.getBoundingClientRect();
        const laneRect = lane.getBoundingClientRect();

        const pos = rect.top - laneRect.top;

        if (pos > 300 && pos < 380) {
            score += 10;
            document.getElementById("score").innerText = score;

            note.style.background = "lime";
            setTimeout(() => note.remove(), 50);
        }
    }
});

/* ===================== VIDA ===================== */
function loseLife() {
    life--;
    document.getElementById("life").innerText = life;

    if (life <= 0) {
        jogoRodando = false;
        player.pauseVideo();
        alert("💀 GAME OVER! Pontos: " + score);
    }
}

/* ===================== TECLAS ===================== */
function mudarTecla(lane) {
    const nova = prompt("Nova tecla para Lane " + (lane + 1)).toLowerCase();

    if (nova && nova.length === 1) {
        teclas[lane] = nova;
        atualizarUI();
    }
}
</script>

</body>
</html>

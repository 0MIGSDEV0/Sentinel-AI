<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mini Guitar Hero</title>

<style>
body {
    background: black;
    color: white;
    text-align: center;
}

.game {
    display: flex;
    justify-content: center;
    margin-top: 20px;
}

.lane {
    width: 80px;
    height: 400px;
    border: 2px solid white;
    margin: 5px;
    position: relative;
    overflow: hidden;
}

.note {
    width: 100%;
    height: 20px;
    background: red;
    position: absolute;
    top: 0;
}
</style>
</head>

<body>

<h1>🎸 Guitar Hero</h1>

<button onclick="iniciarJogo()">▶️ Começar</button>

<!-- música -->
<iframe id="video"
width="560" height="315"
src="https://www.youtube.com/embed/E0ozmU9cJDg?enablejsapi=1"
frameborder="0" allowfullscreen></iframe>

<div class="game">
    <div class="lane" id="lane1"></div>
    <div class="lane" id="lane2"></div>
    <div class="lane" id="lane3"></div>
    <div class="lane" id="lane4"></div>
</div>

<p>Teclas: A S D F</p>

<script>
const lanes = [
    document.getElementById("lane1"),
    document.getElementById("lane2"),
    document.getElementById("lane3"),
    document.getElementById("lane4")
];

let jogoRodando = false;

function iniciarJogo() {
    jogoRodando = true;
    loopNotas();
}

function criarNota() {
    const laneIndex = Math.floor(Math.random() * 4);
    const note = document.createElement("div");
    note.classList.add("note");

    lanes[laneIndex].appendChild(note);

    let pos = 0;

    const intervalo = setInterval(() => {
        pos += 6;
        note.style.top = pos + "px";

        if (pos > 380) {
            clearInterval(intervalo);
            note.remove();
        }
    }, 30);
}

function loopNotas() {
    if (!jogoRodando) return;

    criarNota();
    setTimeout(loopNotas, 500);
}

document.addEventListener("keydown", (e) => {
    if (["a", "s", "d", "f"].includes(e.key)) {
        console.log("Tecla:", e.key);
    }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Guitar Hero Web</title>

<style>
body {
    background: radial-gradient(circle, #111, #000);
    color: white;
    text-align: center;
    font-family: Arial;
}

h1 {
    text-shadow: 0 0 10px red;
}

.game {
    display: flex;
    justify-content: center;
    margin-top: 20px;
}

.lane {
    width: 85px;
    height: 420px;
    border: 2px solid rgba(255,255,255,0.3);
    margin: 5px;
    position: relative;
    overflow: hidden;
    background: rgba(255,255,255,0.03);
}

.note {
    width: 100%;
    height: 20px;
    background: red;
    position: absolute;
    top: 0;
    border-radius: 6px;
    box-shadow: 0 0 8px red;
}

.hit {
    position: absolute;
    bottom: 0;
    height: 12px;
    width: 100%;
    background: yellow;
    box-shadow: 0 0 10px yellow;
}

#player {
    position: absolute;
    left: -9999px;
}

#hud {
    font-size: 18px;
    margin-top: 10px;
}

#feedback {
    font-size: 28px;
    margin-top: 10px;
    height: 40px;
    font-weight: bold;
}

button {
    padding: 8px 12px;
    background: red;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 6px;
}

button:hover {
    background: darkred;
}
</style>
</head>

<body>

<h1>🎸 Guitar Hero Web</h1>

<button onclick="iniciarJogo()">▶️ Começar</button>

<div id="hud">
🏆 Pontos: <span id="score">0</span>
</div>

<div id="feedback"></div>

<div id="player"></div>

<div class="game">
    <div class="lane" id="lane1"><div class="hit"></div></div>
    <div class="lane" id="lane2"><div class="hit"></div></div>
    <div class="lane" id="lane3"><div class="hit"></div></div>
    <div class="lane" id="lane4"><div class="hit"></div></div>
</div>

<p>Teclas: Z X N M</p>

<script>
let player;
let jogoRodando = false;
let score = 0;

// ================= YOUTUBE =================
function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
        height: '0',
        width: '0',
        videoId: 'E0ozmU9cJDg',
        playerVars: {
            autoplay: 0,
            controls: 0,
            mute: 1
        }
    });
}

let tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.body.appendChild(tag);

// ================= JOGO =================
const lanes = [
    document.getElementById("lane1"),
    document.getElementById("lane2"),
    document.getElementById("lane3"),
    document.getElementById("lane4")
];

// 🎯 NOVAS TECLAS
const teclas = ["z", "x", "n", "m"];

const BPM = 220;
const intervaloNotas = 60000 / BPM;
const velocidade = 9;

function iniciarJogo() {
    if (!player) return;

    jogoRodando = true;
    score = 0;

    document.getElementById("score").innerText = score;

    player.playVideo();

    setTimeout(() => {
        player.unMute();
        player.setVolume(100);
    }, 300);

    loopNotas();
}

function criarNota() {
    const laneIndex = Math.floor(Math.random() * 4);
    const note = document.createElement("div");
    note.classList.add("note");

    lanes[laneIndex].appendChild(note);

    let pos = 0;

    const intervalo = setInterval(() => {
        pos += velocidade;
        note.style.top = pos + "px";

        if (pos > 380) {
            clearInterval(intervalo);
            note.remove();
            mostrarFeedback("MISS", "red");
        }
    }, 20);
}

function loopNotas() {
    if (!jogoRodando) return;

    criarNota();
    setTimeout(loopNotas, intervaloNotas);
}

// ================= FEEDBACK =================
function mostrarFeedback(texto, cor) {
    const fb = document.getElementById("feedback");
    fb.innerText = texto;
    fb.style.color = cor;

    setTimeout(() => {
        fb.innerText = "";
    }, 400);
}

// ================= HIT =================
document.addEventListener("keydown", (e) => {
    const index = teclas.indexOf(e.key);

    if (index !== -1) {
        const lane = lanes[index];
        const notes = lane.getElementsByClassName("note");

        if (notes.length > 0) {
            const note = notes[0];
            const pos = parseInt(note.style.top);

            if (pos > 320 && pos < 360) {
                score += 15;
                mostrarFeedback("PERFECT", "lime");
            } 
            else if (pos > 280 && pos < 400) {
                score += 10;
                mostrarFeedback("GOOD", "yellow");
            } 
            else {
                score += 5;
                mostrarFeedback("OK", "orange");
            }

            document.getElementById("score").innerText = score;

            note.style.background = "lime";
            setTimeout(() => note.remove(), 50);
        }
    }
});
</script>

</body>
</html>

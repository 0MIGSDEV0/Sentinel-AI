<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Guitar Hero Web</title>

<style>
body {
    background: black;
    color: white;
    text-align: center;
    font-family: Arial;
}

.game {
    display: flex;
    justify-content: center;
    margin-top: 20px;
}

.lane {
    width: 80px;
    height: 400px;
    border: 2px solid white;
    margin: 5px;
    position: relative;
    overflow: hidden;
}

.note {
    width: 100%;
    height: 20px;
    background: red;
    position: absolute;
    top: 0;
}

.hit {
    position: absolute;
    bottom: 0;
    height: 10px;
    width: 100%;
    background: yellow;
}

#player {
    position: absolute;
    left: -9999px;
}

.keyBox {
    margin-top: 10px;
}
button {
    margin: 5px;
    padding: 5px 10px;
}
</style>
</head>

<body>

<h1>🎸 Guitar Hero Web</h1>

<button onclick="iniciarJogo()">▶️ Começar</button>

<h2>Pontos: <span id="score">0</span></h2>

<div class="keyBox">
    <h3>🎹 Teclas atuais:</h3>
    <p id="keysDisplay"></p>

    <button onclick="mudarTecla(0)">Mudar Lane 1</button>
    <button onclick="mudarTecla(1)">Mudar Lane 2</button>
    <button onclick="mudarTecla(2)">Mudar Lane 3</button>
    <button onclick="mudarTecla(3)">Mudar Lane 4</button>
</div>

<div id="player"></div>

<div class="game">
    <div class="lane" id="lane1"><div class="hit"></div></div>
    <div class="lane" id="lane2"><div class="hit"></div></div>
    <div class="lane" id="lane3"><div class="hit"></div></div>
    <div class="lane" id="lane4"><div class="hit"></div></div>
</div>

<script>
let player;
let jogoRodando = false;
let score = 0;

// 🎯 teclas padrão (editável)
let teclas = ["a", "s", "d", "f"];

function atualizarUI() {
    document.getElementById("keysDisplay").innerText =
        teclas.map((t, i) => `Lane ${i+1}: ${t.toUpperCase()}`).join(" | ");
}

atualizarUI();

// ================= YOUTUBE =================
function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
        height: '0',
        width: '0',
        videoId: 'E0ozmU9cJDg',
        playerVars: {
            autoplay: 0,
            controls: 0,
            mute: 1
        }
    });
}

let tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.body.appendChild(tag);

// ================= JOGO =================
const lanes = [
    document.getElementById("lane1"),
    document.getElementById("lane2"),
    document.getElementById("lane3"),
    document.getElementById("lane4")
];

const BPM = 220;
const intervaloNotas = 60000 / BPM;
const velocidade = 9;

function iniciarJogo() {
    if (!player) return;

    jogoRodando = true;
    score = 0;

    player.playVideo();

    setTimeout(() => {
        player.unMute();
        player.setVolume(100);
    }, 300);

    loopNotas();
}

function criarNota() {
    const laneIndex = Math.floor(Math.random() * 4);
    const note = document.createElement("div");
    note.classList.add("note");

    lanes[laneIndex].appendChild(note);

    let pos = 0;

    const intervalo = setInterval(() => {
        pos += velocidade;
        note.style.top = pos + "px";

        if (pos > 380) {
            clearInterval(intervalo);
            note.remove();
        }
    }, 20);
}

function loopNotas() {
    if (!jogoRodando) return;

    criarNota();
    setTimeout(loopNotas, intervaloNotas);
}

// 🎯 ACERTO COM TECLAS DINÂMICAS
document.addEventListener("keydown", (e) => {
    const index = teclas.indexOf(e.key);

    if (index !== -1) {
        const lane = lanes[index];
        const notes = lane.getElementsByClassName("note");

        if (notes.length > 0) {
            const note = notes[0];
            const pos = parseInt(note.style.top);

            if (pos > 300 && pos < 400) {
                score += 10;
                document.getElementById("score").innerText = score;

                note.style.background = "lime";
                setTimeout(() => note.remove(), 50);
            }
        }
    }
});

// 🔁 mudar tecla
function mudarTecla(lane) {
    const nova = prompt("Digite a nova tecla para a Lane " + (lane+1)).toLowerCase();

    if (nova && nova.length === 1) {
        teclas[lane] = nova;
        atualizarUI();
    }
}
</script>

</body>
</html>
